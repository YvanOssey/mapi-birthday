<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Une surprise t'attend… 🌸</title>
  <link rel="stylesheet" href="style.css">
  <style>
    
    body { display: flex; align-items: center; justify-content: center; }

    /* Fond ambiance */
    .lock-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 20%, rgba(232,160,180,.32) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(201,168,76,.2)  0%, transparent 65%),
        var(--cream);
    }

    /* Contenu centré */
    .lock-inner {
      position: relative; z-index: 1;
      max-width: 600px; width: 100%;
      padding: 3rem 2rem; text-align: center;
    }

    /* Icône cadenas */
    .lock-icon {
      font-size: 3.4rem; display: block;
      margin-bottom: 1.6rem;
      animation: fadeUp .8s ease both, sway 3s 2s ease-in-out infinite;
    }

    /* Titre mystère */
    .lock-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      font-weight: 300; line-height: 1.08; color: var(--dark);
      animation: fadeUp .8s .2s ease both;
    }
    .lock-title em { font-style: italic; color: var(--rose-deep); }

    .lock-sub {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: var(--text-light); margin-top: .9rem;
      animation: fadeUp .8s .35s ease both;
    }

    /* Countdown boxes */
    .lock-cd {
      display: flex; justify-content: center;
      gap: 1.2rem; flex-wrap: wrap;
      animation: fadeUp .8s .6s ease both;
    }
    .cd-box {
      background: var(--white);
      border: 1px solid rgba(201,168,76,.35);
      border-radius: 12px; padding: 1.4rem 1.6rem; min-width: 88px;
      box-shadow: 0 6px 40px rgba(201,168,76,.1);
      position: relative; overflow: hidden;
    }
    .cd-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(to right, var(--rose), var(--gold));
    }
    .cd-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 600;
      line-height: 1; color: var(--rose-deep);
      transition: transform .15s ease;
    }
    .cd-num.flip { transform: scale(.82); }
    .cd-lbl {
      font-size: .58rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--text-light); margin-top: .3rem;
    }

    /* Hint date */
    .lock-hint {
      margin-top: 2.2rem;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 1.05rem; color: var(--text-light);
      animation: fadeUp .8s .8s ease both;
    }
    .lock-hint strong { color: var(--rose-deep); font-style: normal; }

    /* Eyebrow */
    .lock-eyebrow {
      animation: fadeUp .8s .1s ease both;
    }

    /* gold-line animation */
    .gold-line { animation: fadeUp .8s .5s ease both; }

    @media (max-width: 480px) {
      .cd-box { min-width: 70px; padding: 1rem 1.1rem; }
      .cd-num { font-size: 2.1rem; }
    }
  </style>
</head>
<body>

  <!-- Fond -->
  <div class="lock-bg"></div>

  <!-- Pétales -->
  <div id="petals-container"></div>

  <!-- Contenu -->
  <div class="lock-inner">
    <span class="lock-icon">🔒</span>
    <p class="eyebrow lock-eyebrow">✦ Une surprise t'attend ✦</p>
    <h2 class="lock-title">Quelque chose de<br><em>magnifique</em><br>se prépare…</h2>
    <p class="lock-sub">Patience, ma belle… le secret se révélera bientôt</p>
    <div class="gold-line"></div>

    <!-- Compte à rebours -->
    <div class="lock-cd">
      <div class="cd-box">
        <div class="cd-num" id="cd-d">--</div>
        <div class="cd-lbl">Jours</div>
      </div>
      <div class="cd-box">
        <div class="cd-num" id="cd-h">--</div>
        <div class="cd-lbl">Heures</div>
      </div>
      <div class="cd-box">
        <div class="cd-num" id="cd-m">--</div>
        <div class="cd-lbl">Minutes</div>
      </div>
      <div class="cd-box">
        <div class="cd-num" id="cd-s">--</div>
        <div class="cd-lbl">Secondes</div>
      </div>
    </div>

    <p class="lock-hint">
      Le <strong>3 Avril à minuit</strong>, tout se dévoile rien que pour toi 🌸
    </p>
  </div>

  <script>
    // ── PÉTALES ──
    (function () {
      const c = document.getElementById('petals-container');
      const cols = ['#e8a0b4','#f0b8c8','#fde8ef','rgba(201,168,76,.35)','#f7c5d5'];
      for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        const s = Math.random() * 13 + 5;
        p.style.cssText = `
          width:${s}px; height:${s}px;
          left:${Math.random() * 100}%;
          background:${cols[~~(Math.random() * cols.length)]};
          animation-duration:${Math.random() * 14 + 8}s;
          animation-delay:${Math.random() * 12}s;
        `;
        c.appendChild(p);
      }
    })();

    // ── DATE CIBLE : 3 AVRIL MINUIT ──
    const BIRTHDAY = new Date(new Date().getFullYear(), 3, 3, 0, 0, 0);

    function isBirthdayOrLater() {
      return new Date() >= BIRTHDAY;
    }

    // Si le jour J est atteint → rediriger vers index.html
    function checkAndRedirect() {
      if (isBirthdayOrLater()) {
        window.location.href = 'index.html';
      }
    }
    checkAndRedirect();

    // ── TICKER ──
    function tick() {
      if (isBirthdayOrLater()) {
        window.location.href = 'index.html';
        return;
      }
      const diff = BIRTHDAY - new Date();
      setNum('cd-d', Math.floor(diff / 86400000));
      setNum('cd-h', Math.floor((diff % 86400000) / 3600000));
      setNum('cd-m', Math.floor((diff % 3600000) / 60000));
      setNum('cd-s', Math.floor((diff % 60000) / 1000));
    }

    function setNum(id, val) {
      const el = document.getElementById(id);
      const str = String(val).padStart(2, '0');
      if (el.textContent !== str) {
        el.classList.add('flip');
        setTimeout(() => { el.textContent = str; el.classList.remove('flip'); }, 150);
      }
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
